version: '3.8'

services:

  # ── Base de données PostgreSQL ─────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: recouvrement_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: recouvrement_user
      POSTGRES_PASSWORD: recouvrement_pass_2024
      POSTGRES_DB: recouvrement_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - recouvrement_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U recouvrement_user -d recouvrement_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Cache Redis ────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: recouvrement_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - recouvrement_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── API FastAPI principale ─────────────────────────────────────────────────
  fastapi:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: recouvrement_api
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # URL interne du service NLP (réseau Docker)
      SENTIMENT_SERVICE_URL: http://sentiment:8001
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      sentiment:
        condition: service_healthy
    volumes:
      - ./app:/app/app
      - ./logs:/app/logs
    networks:
      - recouvrement_network

  # ── Service NLP Sentiment ──────────────────────────────────────────────────
  sentiment:
    build:
      context: .
      dockerfile: Dockerfile.sentiment
    container_name: recouvrement_sentiment
    restart: unless-stopped
    ports:
      - "8001:8001"
    # Le modèle HuggingFace est mis en cache dans un volume
    # pour ne pas le re-télécharger à chaque rebuild
    volumes:
      - huggingface_cache:/root/.cache/huggingface
    deploy:
      resources:
        limits:
          memory: 2g
    networks:
      - recouvrement_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ── PgAdmin ────────────────────────────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: recouvrement_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@banquezitouna.tn
      PGADMIN_DEFAULT_PASSWORD: admin123
      PGADMIN_LISTEN_PORT: 80
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - recouvrement_network
    depends_on:
      - postgres

volumes:
  postgres_data:
  redis_data:
  pgadmin_data:
  huggingface_cache:   # cache modèle HF persistant entre les rebuilds

networks:
  recouvrement_network:
    driver: bridge